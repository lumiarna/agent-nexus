<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c89a74"></stop>
      <stop offset="0.5" stop-color="#a9774f"></stop>
      <stop offset="1" stop-color="#8a5733"></stop>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"></stop>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.05"></stop>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"></stop>
    </linearGradient>
    <radialGradient id="node" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#ffffff"></stop>
      <stop offset="1" stop-color="#f0e2d4"></stop>
    </radialGradient>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
