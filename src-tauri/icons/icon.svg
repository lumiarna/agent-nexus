  </g>

  
  <g filter="url(#ds)">
    <g stroke="#ffffff" stroke-width="5.5" stroke-linecap="round" stroke-opacity="0.92">
      <path d="M64 64 V36"></path>
      <path d="M64 64 L40 86"></path>
      <path d="M64 64 L88 86"></path>
    </g>
    <circle cx="64" cy="64" r="11" fill="url(#node)"></circle>
    <circle cx="64" cy="32" r="8" fill="url(#node)"></circle>
    <circle cx="38" cy="88" r="8" fill="url(#node)"></circle>
    <circle cx="90" cy="88" r="8" fill="url(#node)"></circle>
  </g>

  
  <rect x="6.75" y="6.75" width="114.5" height="114.5" rx="27.25" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"></rect>
