<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Agent Nexus — 共享 Agent 资产的本地工作台</title>
  <desc id="desc">暖沙色标题画面展示一个 Skill 的 canonical source 通过 Agent Matrix 分发到 Generic Agent、CodeX、Copilot 与 OpenCode。</desc>

  <rect width="1200" height="420" rx="28" fill="#f3ece3"/>
  <path d="M670 44V376" stroke="#e2d5c5" stroke-width="1.5"/>

  <g id="identity" transform="translate(54 46)">
    <g id="mark" transform="translate(0 0)">
      <rect width="64" height="64" rx="17" fill="#9d7a64"/>
      <g fill="none" stroke="#fcf9f4" stroke-width="4" stroke-linecap="round">
        <path d="M32 31V17"/>
        <path d="M32 31L18 45"/>
        <path d="M32 31L46 45"/>
      </g>
      <g fill="#fcf9f4">
        <circle cx="32" cy="31" r="7"/>
        <circle cx="32" cy="14" r="5"/>
        <circle cx="15" cy="48" r="5"/>
        <circle cx="49" cy="48" r="5"/>
      </g>
    </g>

    <text x="84" y="20" fill="#9d7a64" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" font-weight="700" letter-spacing="1.6">LOCAL DESKTOP WORKSPACE</text>
    <text x="84" y="47" fill="#7a6f60" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">TAURI 2 · REACT · RUST · SQLITE</text>

    <text x="0" y="143" fill="#2a2520" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" font-size="70" font-weight="800" letter-spacing="-3">Agent Nexus</text>
    <text x="2" y="190" fill="#3a302a" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" font-size="27" font-weight="700">让不同 AI 编程 Agent 共享同一层资产</text>
    <text x="2" y="232" fill="#7a6f60" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" font-size="19">在一个本地工作台中管理 Project、Skill、Prompt、</text>
    <text x="2" y="260" fill="#7a6f60" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" font-size="19">Session 与 Provider，不再逐个工具重复维护。</text>

    <g id="surfaces" transform="translate(0 305)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="700" letter-spacing="0.7">
      <g><rect width="94" height="35" rx="17.5" fill="#fcf9f4" stroke="#dfd2c1"/><text x="47" y="23" text-anchor="middle" fill="#6a6055">PROJECT</text></g>
      <g transform="translate(103 0)"><rect width="78" height="35" rx="17.5" fill="#fcf9f4" stroke="#dfd2c1"/><text x="39" y="23" text-anchor="middle" fill="#6a6055">SKILL</text></g>
      <g transform="translate(190 0)"><rect width="88" height="35" rx="17.5" fill="#fcf9f4" stroke="#dfd2c1"/><text x="44" y="23" text-anchor="middle" fill="#6a6055">PROMPT</text></g>
      <g transform="translate(287 0)"><rect width="94" height="35" rx="17.5" fill="#fcf9f4" stroke="#dfd2c1"/><text x="47" y="23" text-anchor="middle" fill="#6a6055">SESSION</text></g>
      <g transform="translate(390 0)"><rect width="104" height="35" rx="17.5" fill="#fcf9f4" stroke="#dfd2c1"/><text x="52" y="23" text-anchor="middle" fill="#6a6055">PROVIDER</text></g>
    </g>
  </g>

  <g id="agent-matrix" transform="translate(704 48)">
    <rect width="442" height="324" rx="22" fill="#fcf9f4" stroke="#e7ddce" stroke-width="1.5"/>
    <text x="28" y="36" fill="#2a2520" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="800">Agent Matrix</text>
    <text x="28" y="59" fill="#a99a89" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">ONE SOURCE → MANAGED PLACEMENTS</text>
    <path d="M28 78H414" stroke="#efe6da" stroke-width="1.5"/>

    <g id="canonical-source" transform="translate(28 106)">
      <rect width="176" height="94" rx="15" fill="#f0e8db" stroke="#dcc9b5"/>
      <text x="16" y="25" fill="#9d7a64" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="700" letter-spacing="0.8">CANONICAL SOURCE</text>
      <text x="16" y="52" fill="#2a2520" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="800">review-workflow</text>
      <text x="16" y="76" fill="#7a6f60" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">Claude Code · Skill</text>
    </g>

    <g id="distribution-lines" fill="none" stroke="#bda994" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M204 153H226V101H247"/>
      <path d="M226 153V153H247"/>
      <path d="M226 153V205H247"/>
      <path d="M226 153V257H247"/>
    </g>
    <g fill="#9d7a64">
      <circle cx="226" cy="101" r="4"/><circle cx="226" cy="153" r="4"/><circle cx="226" cy="205" r="4"/><circle cx="226" cy="257" r="4"/>
    </g>

    <g id="placements" transform="translate(247 80)" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
      <g><rect width="167" height="42" rx="12" fill="#f8f3ea" stroke="#e7ddce"/><circle cx="20" cy="21" r="7" fill="#9a7b53"/><text x="36" y="27" fill="#3a302a" font-size="16" font-weight="700">Generic Agent</text></g>
      <g transform="translate(0 52)"><rect width="167" height="42" rx="12" fill="#f8f3ea" stroke="#e7ddce"/><circle cx="20" cy="21" r="7" fill="#4f7a6a"/><text x="36" y="27" fill="#3a302a" font-size="16" font-weight="700">CodeX</text></g>
      <g transform="translate(0 104)"><rect width="167" height="42" rx="12" fill="#f8f3ea" stroke="#e7ddce"/><circle cx="20" cy="21" r="7" fill="#5a7894"/><text x="36" y="27" fill="#3a302a" font-size="16" font-weight="700">Copilot</text></g>
      <g transform="translate(0 156)"><rect width="167" height="42" rx="12" fill="#f8f3ea" stroke="#e7ddce"/><circle cx="20" cy="21" r="7" fill="#8b5cf6"/><text x="36" y="27" fill="#3a302a" font-size="16" font-weight="700">OpenCode</text></g>
    </g>

    <g transform="translate(28 286)">
      <circle cx="6" cy="0" r="5" fill="#8a9a5b"/>
      <text x="18" y="5" fill="#6a6055" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">4 PLACEMENTS · SOURCE STAYS AUTHORITATIVE</text>
    </g>
  </g>
</svg>
